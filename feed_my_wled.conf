[WLED]
# Optional multi-target mode (comma-separated). Each item can be IP or IP:PORT.
# Example: WLED_TARGETS = 192.168.1.25, 192.168.1.26:11988, 192.168.1.27
WLED_TARGETS = 192.168.1.25, 192.168.1.26, 192.168.1.109

# The IP address of the WLED device
WLED_IP_ADDRESS = 192.168.1.25

# The UDP port for the connection (default: 11988)
WLED_UDP_PORT = 11988

[Audio]
# The sample rate of the audio stream (default for Shairport is 88200)
sample_rate = 88200

# If true, use buffer_size/chunk_size to intentionally delay analysis.
# Keep this false for lowest latency when tapping your live output monitor.
enable_buffer_delay = false

# Size of the buffer in bytes (increase to add more delay)
buffer_size = 163840

# Size of the data chunks in bytes (increase to reduce bandwidth usage)
chunk_size = 8192

[Processing]
# Reject low-level detail/noise. Increase for cleaner, punchier trigger behavior.
noise_gate_level = 1500

# Hysteresis keeps gate stable. Lower value = less chatter around threshold.
gate_hysteresis = 0.8

# Envelope follower. Faster attack catches hits; slower release reduces flicker.
level_attack = 0.5
level_release = 0.06

# >1 suppresses small sounds and emphasizes stronger peaks.
level_curve = 1.4

# FFT shaping for less "tiny sparkle" reaction.
fft_floor = 0.16
fft_curve = 1.8

# Adaptive gain for FFT. Higher attack reacts faster to loud changes.
fft_agc_attack = 0.20
fft_agc_release = 0.01
